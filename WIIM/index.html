 <script>
 // Funkcja usuwająca wszystkie magazyny cache
async function clearServiceWorkerCache() {
  if ('caches' in window) {
    const cacheNames = await caches.keys();
    await Promise.all(
      cacheNames.map(name => caches.delete(name))
    );
    console.log('Cache Service Workera został wyczyszczony.');
    
    // Opcjonalnie: odśwież stronę, aby pobrać nowe zasoby
    window.location.reload();
  }
}
