<!DOCTYPE html>
<html lang="pl">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="HandheldFriendly" content="true">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="theme-color" content="#008">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 18 18'><text x='-1' y='14'>📺</text></svg>"/>
    <meta charset="UTF-8">
    <title>All</title>
    <script>const storageName = "All";</script>


<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: #000;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow: hidden; /* Blokujemy domyślny scrollbar */
}

.swiper {
    width: 100vw;
    height: 100vh;
    position: relative;
}
.swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-sizing: border-box;
    padding: 40px;
}

/* Przykładowe zróżnicowanie tła sekcji dla testu (wszystkie ciemne) */
.section-home { background: #000000; }
.section-about { background: #050505; border-top: 1px solid #111; }
.section-contact { background: #0a0a0a; }

.content h1, .content h2 {
    font-size: clamp(2rem, 8vw, 5rem);
    font-weight: 900;
    color: #3b82f6; /* Twój błękitny akcent */
    margin-bottom: 20px;
}

.content p {
    font-size: 1.2rem;
    color: #888;
}

/* Customizacja kropek nawigacji pod Dark Mode */
.swiper-pagination-bullet {
    background: #555 !important;
    opacity: 1;
}
.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywna kropka świeci na niebiesko */
}

/* Styl dla kontenera kropek na dole ekranu */
.swiper-pagination {
    bottom: 30px !important; /* Odstęp od dolnej krawędzi ekranu */
}

.swiper-pagination-bullet {
    background: #333 !important;
    opacity: 1;
    width: 12px;
    height: 12px;
    margin: 0 6px !important;
    transition: all 0.3s ease;
}

.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywny slajd świeci na niebiesko */
    width: 30px; /* Efektowna podłużna kropka dla aktywnego slajdu */
    border-radius: 6px;
}
</style>
</head>
<body>

<!-- Główny kontener Swipera -->
<div class="swiper">
    <!-- Kontener na slajdy (podstrony) -->
    <div class="swiper-wrapper">
        
        <!-- Sekcja 1: Home / Start -->
        <section class="swiper-slide section-home" data-name="Home">
            <div class="content">
                <h1>STRONA GŁÓWNA</h1>
                <p>Użyj kółka myszy lub przesuń palcem, aby przejść dalej.</p>
            </div>
        </section>

        <!-- Sekcja 2: O nas / Galeria -->
        <section class="swiper-slide section-about" data-name="Galeria">
            <div class="content">
                <h2>O PROJEKCIE</h2>
                <p>Tutaj możesz umieścić swoją kontrastową tabelę lub galerię zdjęć.</p>
            </div>
        </section>

        <!-- Sekcja 3: Kontakt -->
        <section class="swiper-slide section-contact" data-name="Kontakt">
            <div class="content">
                <h2>KONTAKT</h2>
                <p>Napisz do nas lub sprawdź widget pogodowy.</p>
            </div>
        </section>

    </div>
    
    <!-- Opcjonalnie: Kropki nawigacyjne po boku -->
    <div class="swiper-pagination"></div>
</div>

<!-- Dołączamy pliki SwiperJS z CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>



<script>
let aktualnyIndeks = 0;

const swiper = new Swiper('.swiper', {
    // Kierunek przewijania: 'vertical' (pionowo) lub 'horizontal' (poziomo)
    direction: 'horizontal', 
    
    // Płynność i szybkość przejścia (w milisekundach)
    speed: 800,
    loop: true,
    // Włączamy obsługę kółka myszy
// Kompleksowa konfiguracja myszy
    mousewheel: {
        enabled: true,
        // forceToAxis: false pozwala na to, by zwykły scroll góra/dół myszy 
        // przesuwał slajdy w bok (w lewo/prawo)
        forceToAxis: false, 
        // Zapobiega blokowaniu strony, gdy dotrzesz do pierwszego/ostatniego slajdu
        releaseOnEdges: true,
        // Czułość przewijania (możesz zwiększyć, jeśli przewija za wolno)
        sensitivity: 1,
    },    
    // Włączamy obsługę strzałek na klawiaturze
    keyboard: {
        enabled: true,
        onlyInViewport: true,
    },
    
    // Kropki nawigacyjne po boku strony
    pagination: {
        el: '.swiper-pagination',
        clickable: true, // Pozwala klikać w kropki, by skakać do sekcji
    },
    
    // Efekt przejścia (opcjonalnie: 'slide', 'fade', 'cube', 'flip')
    effect: 'slide',
    
    
    // TUTAJ DODAJEMY WYKRYWANIE ZMIANY STRONY
    on: {
        slideChange: function () {
            // 'this.activeIndex' zwraca numer aktualnego slajdu (od 0)
            aktualnyIndeks = this.activeIndex;  
            console.log("Użytkownik przeszedł do slajdu numer: " + aktualnyIndeks);
            
            // W JS wewnątrz slideChange:
			const activeSlideElement = this.slides[this.activeIndex];
			const nazwaStrony = activeSlideElement.getAttribute('data-name');
			console.log("Aktualna sekcja to: " + nazwaStrony);
            
            
            
            
            
            // Przykład wykonania akcji w zależności od strony:
            if (aktualnyIndeks === 0) {
                console.log("Wyświetlam: Strona główna");
            } else if (aktualnyIndeks === 1) {
                console.log("Wyświetlam: Pogoda (uruchamiam odświeżenie danych)");
                // Tutaj możesz np. wywołać funkcję pobierającą pogodę, żeby dane były świeże:
                // getFullWeather(); 
            } else if (aktualnyIndeks === 2) {
                console.log("Wyświetlam: Wyszukiwarka JSON");
            }
        },
    },
});

</script>

</body>
</html>
