<style>
:root {
    --bg-black: #f8f8f8;
    --bg-color: #f4f7f6;
    --bg-gray: #eee;
    --bg-dark: #ddd;
    --container-bg: #ffffff;
    --text-color: #333333;
    --text-color-check: #777;
    --border-color: #eeeeee;
    --item-border: #f0f0f0;
    --color-blind: #ccc;
    --bg-btn:#568;
}

/* Kolory dla trybu ciemnego */
[data-theme="dark"] {
	--bg-black: #000;
    --bg-color: #181a1b;
    --bg-gray: #444;
    --bg-dark: #222;
    --container-bg: #333;
    --text-color: #fff;
    --text-color-check : #678;
    --border-color: #3e4446;
    --item-border: #313537;
    --color-blind: #777;
    --bg-btn:#568;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background-color: #000;
    font-family: 'Verdana', 'Inter', sans-serif;
    font-size:13pt;
    color: #fff;
    overflow: hidden; /* Blokujemy domyślny scrollbar */
}

.swiper {
    width: 100vw;
    height: 100vh;
    position: relative;
}
.swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-sizing: border-box;
    padding: 5px;
}

/* Przykładowe zróżnicowanie tła sekcji dla testu (wszystkie ciemne) */
.section-home { background: #000000; }
.section-about { background: #050505; border-top: 1px solid #111; }
.section-contact { background: #0a0a0a; }

.content h1, .content h2 {
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 900;
    color: #3b82f6; /* Twój błękitny akcent */
    margin-bottom: 20px;
}

.content p {
    font-size: 1.0rem;
    color: #ddd;
}

/* Customizacja kropek nawigacji pod Dark Mode */
.swiper-pagination-bullet {
    background: #555 !important;
    opacity: 1;
}
.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywna kropka świeci na niebiesko */
}

/* Styl dla kontenera kropek na dole ekranu */
.swiper-pagination {
    bottom: 30px !important; /* Odstęp od dolnej krawędzi ekranu */
}

.swiper-pagination-bullet {
    background: #333 !important;
    opacity: 1;
    width: 12px;
    height: 12px;
    margin: 0 6px !important;
    transition: all 0.3s ease;
}

.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywny slajd świeci na niebiesko */
    width: 30px; /* Efektowna podłużna kropka dla aktywnego slajdu */
    border-radius: 6px;
}

/*===========================*/
nav {
    display: flex;
    justify-content: space-evenly;
    align-items: flex-start;
    flex-direction: row;
    flex-wrap: nowrap;
    font-size: 2em;
    margin-top:0.5em;
}
foo,bar {display: flex;}
foo {display: flex;}
bar {display: flex;}
.theme-switch {
    cursor: pointer;
}
.active {
    background: darkred;
    border: solid 3px red;
}

.input-row {
    display: flex;
    gap: 5px;
    margin-bottom: 5px;
}

main {
    padding: 5px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 712px;
    margin: 6px auto 5px auto;
}

input {
    flex: 1;
    padding: 10px;
    border: 2px solid #eee;
    border-radius: 6px;
    outline: none;
    font-size: 21px;
    transition: border-color 0.3s;
    background: var(--container-bg);
    color: var(--text-color);
    border: 2px solid var(--border-color);
    font-size: 0.95rem !important;
}
input:focus {
    border-color: #28a745;
}

button {
    padding: 8px;
    font-size:1rem;
    border: none;
    background: #28a745;
    color: white;
    min-width: 4rem;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.3s;
    text-decoration:none;
}
button.btno, .btno {
	background:transparent; 
	min-width:initial;
	float: right;
    background: transparent;
    min-width: initial;
    margin-right: 1em;
}
button:hover {
    background: #218838;
}
button.big {
	min-width: 6rem;
	background: #258;
	font-weight:bold;
}
button:hover {
    background: #218838;
}
.edit-btn {
    color: #007bff;
    background: none;
    border: none;
    padding-right: 16px;
}
.edit-btn, span {
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0 8px;
    user-select: none;
}

li {
        border-bottom: 1px solid var(--item-border);
    background: var(--bg-gray);
    color: var(--text-color);
    padding: 3px;
    border-bottom: 0.5px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    /* font-size: 1rem; */


}

</style>

<script>
	const $=e=>document.querySelector(e);
	const $$=e=>document.querySelectorAll(e);
	const upFirst=(str)=>str.charAt(0).toUpperCase() + str.slice(1);
	const setActive=(ten)=>{
		  let parent = ten.parentElement;
		  let keys   = parent.querySelectorAll("button");
		  keys.forEach(key=>key.classList.remove("active"));
		  ten.classList.add("active");
	}
</script>

</head>
<body>

<!-- Główny kontener Swipera -->
<div class="swiper">
    <nav> </nav>
    <!-- Kontener na slajdy (podstrony) -->
    <div class="swiper-wrapper">
        
        <!-- Sekcja 1: Home / Start -->
        <section class="swiper-slide section-home" data-name="Alfa">
        	<foo></foo>
			<bar></bar>
            <div class="content">
                <h2>STRONA GŁÓWNA</h2>
                <main></main>
                <p>Użyj kółka myszy lub przesuń palcem, aby przejść dalej.</p>
            </div>
        </section>

        <!-- Sekcja 2: O nas / Galeria -->
        <section class="swiper-slide section-about" data-name="Beta">
        	<foo></foo>
			<bar></bar>
            <div class="content">
                <h2>O PROJEKCIE</h2>
                <main></main>
                <p>Tutaj możesz umieścić swoją kontrastową tabelę lub galerię zdjęć.</p>
            </div>
        </section>

        <!-- Sekcja 3: Kontakt -->
        <section class="swiper-slide section-contact" data-name="Gamma">
        	<foo></foo>
			<bar></bar>
            <div class="content">            	
                <h2>KONTAKT</h2>
                <main></main>
                <p>Napisz do nas lub sprawdź widget pogodowy.</p>
            </div>
        </section>
        
        <!-- Sekcja 4: Omega -->
        <section class="swiper-slide section-contact" data-name="Omega">
        	<foo></foo>
			<bar></bar>
            <div class="content">
                <h2>Omega</h2>
                <main></main>
                <p>Napisz do nas lub sprawdź widget pogodowy.</p>
            </div>
        </section>
        
        <!-- Sekcja 5: Nota -->
        <section class="swiper-slide section-contact" data-name="Nota">
        	<foo></foo>
			<bar></bar>
            <div class="content">
                <h2>Nota</h2>
                <main></main>
                <p>Tu będą zapiski</p>
            </div>
        </section>

    </div>
    
    <!-- Opcjonalnie: Kropki nawigacyjne po boku -->
    <div class="swiper-pagination"></div>
</div>

<!-- Dołączamy pliki SwiperJS z CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>



<script>
let aktualnyIndeks = 0;
let firstRun=0;
const setActivePage=(aktualnyIndeks,nazwaStrony)=>{
	console.log(firstRun,aktualnyIndeks,nazwaStrony,"."+nazwaStrony+"-btn");
	$$(".theme-switch").forEach(b=>b.classList.remove("active"));
	if (firstRun != 0) $("."+nazwaStrony+"-btn").classList.add("active");
	firstRun++
}

const swiper = new Swiper('.swiper', {
    // Kierunek przewijania: 'vertical' (pionowo) lub 'horizontal' (poziomo)
    direction: 'horizontal', 
    
    // Płynność i szybkość przejścia (w milisekundach)
    speed: 800,
    loop: true,
    // Włączamy obsługę kółka myszy
    // Kompleksowa konfiguracja myszy
    mousewheel: {
        enabled: true,
        // forceToAxis: false pozwala na to, by zwykły scroll góra/dół myszy 
        // przesuwał slajdy w bok (w lewo/prawo)
        forceToAxis: false, 
        // Zapobiega blokowaniu strony, gdy dotrzesz do pierwszego/ostatniego slajdu
        releaseOnEdges: true,
        // Czułość przewijania (możesz zwiększyć, jeśli przewija za wolno)
        sensitivity: 1,
    },    
    // Włączamy obsługę strzałek na klawiaturze
    keyboard: {
        enabled: true,
        onlyInViewport: true,
    },
    
    // Kropki nawigacyjne po boku strony
    pagination: {
        el: '.swiper-pagination',
        clickable: true, // Pozwala klikać w kropki, by skakać do sekcji
    },
    
    // Efekt przejścia (opcjonalnie: 'slide', 'fade', 'cube', 'flip')
    effect: 'slide',    
    
    // TUTAJ DODAJEMY WYKRYWANIE ZMIANY STRONY
    on: {
        slideChange: function () {
            // 'this.activeIndex' zwraca numer aktualnego slajdu (od 0)
            aktualnyIndeks = this.activeIndex;  
            
            //console.log("Użytkownik przeszedł do slajdu numer: " + aktualnyIndeks);
            
            // W JS wewnątrz slideChange:
			const activeSlideElement = this.slides[this.activeIndex];
			const nazwaStrony = activeSlideElement.getAttribute('data-name');
			setActivePage(aktualnyIndeks,nazwaStrony);
			//console.log(aktualnyIndeks,"Aktualna sekcja to: " + nazwaStrony);
            // Przykład wykonania akcji w zależności od strony:
            if (aktualnyIndeks === 0) {
                //console.log("Wyświetlam: Strona główna");
            } else if (aktualnyIndeks === 1) {
                //console.log("Wyświetlam: Pogoda (uruchamiam odświeżenie danych)");
                // Tutaj możesz np. wywołać funkcję pobierającą pogodę, żeby dane były świeże:
                // getFullWeather(); 
            } else if (aktualnyIndeks === 2) {
                //console.log("Wyświetlam: Wyszukiwarka JSON");
            }
        },
    },
});



//========================================
const templeta=(nr,name)=> {
	return `
	<div class="input-row">
            <input type="text" id="${name}_input" class="todo-input" placeholder="Dodaj nowe zadanie...">
            <button onclick='addTask("${name}_input")'>Dodaj</button>
        </div>
        <ul id="${name}_list" class="list-container"></ul>
	`;
}

let inputBox      = null;
let listContainer = null;

const pageINI=()=>{
    $("nav").innerHTML=`
	<div class="theme-switch Home-btn" >🏠</div>
	<div class="theme-switch Alfa-btn" >🧑‍🦳</div>
	<div class="theme-switch Beta-btn" >🧔</div>
	<div class="theme-switch Gamma-btn">👫</div>	
	<div class="theme-switch Omega-btn">🗳️</div>
	<div class="theme-switch Nota-btn" >📝</div>	
	`;
	
	const swipery = $$(".swiper-slide");
	swipery.forEach((s,i)=>{
		const name = s.dataset.name;
		s.querySelector("div.content h2").innerHTML=name;
		s.querySelector("main").innerHTML=templeta(i,name);
		s.id=name;
	});
	document.querySelector(".Home-btn").addEventListener("click",  ()=>{location.href="../../index.html"});
	document.querySelector(".Alfa-btn").addEventListener("click",  ()=>{swiper.slideToLoop(0, 800);});
	document.querySelector(".Beta-btn").addEventListener("click",  ()=>{swiper.slideToLoop(1, 800);});
	document.querySelector(".Gamma-btn").addEventListener("click", ()=>{swiper.slideToLoop(2, 800);});
	document.querySelector(".Omega-btn").addEventListener("click", ()=>{swiper.slideToLoop(3, 800);});
	document.querySelector(".Nota-btn").addEventListener("click",  ()=>{swiper.slideToLoop(4, 800);});
	
	
	inputBox      = document.querySelector(".todo-input");
	listContainer = document.querySelector(".list-container");

	
	// Obsługa Entera
	inputBox.addEventListener("keypress", function(event) {
		if (event.key === "Enter") {
		    addTask();
		}
	});

	listContainer.addEventListener("click", function(e) {
		if (e.target.tagName === "P") {
		    e.target.parentElement.classList.toggle("checked");
		    saveData();
		} 
		else if (e.target.tagName === "SPAN") {
		    e.target.parentElement.parentElement.remove();
		    saveData();
		}
		else if (e.target.classList.contains("edit-btn")) {
		    let p = e.target.parentElement.parentElement.querySelector("p");
		    let newText = prompt("Edytuj zadanie:", p.innerHTML);
		    
		    if (newText !== null && newText.trim() !== "") {
		        p.innerHTML = newText;
		        saveData();
		    }
		}
	}, false);
	

} // eof page ini


	/*fetch(u)
      .then(r => {return r.json()})
      .then(o => {console.log(o)})
      .catch(e => {console.log(e)})*/
      
      
      
      
      
      
      

const addTask=()=> {
	console.log(inputBox.value);
    if (inputBox.value.trim() === '') {
        alert("Musisz coś wpisać!");
    } else {
        createTaskElement(inputBox.value, false);
        saveData();
    }
    inputBox.value = "";
}

const createTaskElement=(text, isChecked)=> {
    let li = document.createElement("li");
    if (isChecked) li.classList.add("checked");

    let textSpan = document.createElement("p");
    textSpan.innerHTML = text;
    li.appendChild(textSpan);

    let btnContainer = document.createElement("div");

    let editBtn = document.createElement("button");
    editBtn.innerHTML = "✎";
    editBtn.className = "edit-btn";
    btnContainer.appendChild(editBtn);

    let deleteBtn = document.createElement("span");
    deleteBtn.innerHTML = "\u00d7";
    btnContainer.appendChild(deleteBtn);

    li.appendChild(btnContainer);
    listContainer.appendChild(li);
}


function saveData() {
    //localStorage.setItem(storageName, listContainer.innerHTML);
}

function showTask() {
    //listContainer.innerHTML = localStorage.getItem(storageName) || "";
}








document.addEventListener("DOMContentLoaded",function(){
    document.documentElement.setAttribute("data-theme", "dark");
	pageINI();
    showTask();
});
      
      
</script>
