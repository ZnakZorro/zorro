/* Customizacja kropek nawigacji pod Dark Mode */
.swiper-pagination-bullet {
    background: #555 !important;
    opacity: 1;
}
.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywna kropka świeci na niebiesko */
}

/* Styl dla kontenera kropek na dole ekranu */
.swiper-pagination {
    bottom: 30px !important; /* Odstęp od dolnej krawędzi ekranu */
    
}

.swiper-pagination-bullet {
    background: #ddd !important;
    opacity: 0.85!important;
    width: 12px;
    height: 12px;
    margin: 0 6px !important;
    transition: all 0.3s ease;
}

.swiper-pagination-bullet-active {
    background: #3b82f6 !important; /* Aktywny slajd świeci na niebiesko */
    width: 30px; /* Efektowna podłużna kropka dla aktywnego slajdu */

}
.swiper-pagination-bullet{opacity:0.5;}

li {

   /* Stylizacja wielolinijkowego pola */

        width: 100%;

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<script>
    const $=e=>document.querySelector(e);
	const $$=e=>document.querySelectorAll(e);
	const upFirst=(str)=>str.charAt(0).toUpperCase() + str.slice(1);
	const setActive=(ten)=>{
		  let parent = ten.parentElement;
		  let keys   = parent.querySelectorAll("button");
		  keys.forEach(key=>key.classList.remove("active"));
		  ten.classList.add("active");
	}

let aktualnyIndeks = 0;
let firstRun=0;
const setActivePage=(aktualnyIndeks,nazwaStrony)=>{
	$$(".theme-switch").forEach(b=>b.classList.remove("active"));
	if (firstRun != 0) $("."+nazwaStrony+"-btn").classList.add("active");
	firstRun++
}

const swiper = new Swiper('.swiper', {
    // Kierunek przewijania: 'vertical' (pionowo) lub 'horizontal' (poziomo)
    direction: 'horizontal', 
    
    // Płynność i szybkość przejścia (w milisekundach)
    speed: 800,
    loop: true,
    // Kompleksowa konfiguracja myszy
    mousewheel: {
        enabled: true,
        // forceToAxis: false pozwala na to, by zwykły scroll góra/dół myszy 
        // przesuwał slajdy w bok (w lewo/prawo)
        forceToAxis: false, 
        // Zapobiega blokowaniu strony, gdy dotrzesz do pierwszego/ostatniego slajdu
        releaseOnEdges: true,
        // Czułość przewijania (możesz zwiększyć, jeśli przewija za wolno)
        sensitivity: 1,
    },    
    // Włączamy obsługę strzałek na klawiaturze
    keyboard: {
        enabled: true,
        onlyInViewport: true,
    },    
    // Kropki nawigacyjne po boku strony
    pagination: {
        el: '.swiper-pagination',
        clickable: true, // Pozwala klikać w kropki, by skakać do sekcji
    },    
    // Efekt przejścia (opcjonalnie: 'slide', 'fade', 'cube', 'flip')
    effect: 'slide',    
    // TUTAJ DODAJEMY WYKRYWANIE ZMIANY STRONY
    on: {
        slideChange: function () {
            // 'this.activeIndex' zwraca numer aktualnego slajdu (od 0)
            aktualnyIndeks = this.activeIndex;
			const activeSlideElement = this.slides[this.activeIndex];
			const nazwaStrony = activeSlideElement.getAttribute('data-name');
			setActivePage(aktualnyIndeks,nazwaStrony);
        },
    },
});



//========================================
const templeta=(nr,name)=> {
	return `
	<div class="input-row">
            <input type="text" id="${name}_input" class="todo-input" placeholder="Dodaj nowe zadanie...">
            <button onclick='addTask("${name}_input")'>Dodaj</button>
        </div>
        <ul id="${name}_list" class="list-container"></ul>
	`;
}


let inputBoxs      = null;
let listsContainer = null;
let sliderNames    = [];

const pageINI=()=>{
    const swipery = $$(".swiper-slide");
    swipery.forEach((s,i)=>{
        const name = s.dataset.name;
        sliderNames.push(name);
        s.querySelector("div.content h2").innerHTML=name;
        s.querySelector("main").innerHTML=templeta(i,name);
        s.id=name;
        showTask(name+"_input");
    });
    console.log("Slider names:", sliderNames);
    $("nav").innerHTML=`
	<div class="theme-switch Home-btn" >🏠</div>
	<div class="theme-switch ${sliderNames[0]}-btn">🧑‍🦳</div>
	<div class="theme-switch ${sliderNames[1]}-btn">🧔</div>
	<div class="theme-switch ${sliderNames[2]}-btn">👫</div>	
	<div class="theme-switch ${sliderNames[3]}-btn">🗳️</div>
	<div class="theme-switch ${sliderNames[4]}-btn">📝</div>	
	`;
	
	document.querySelector(".Home-btn").addEventListener("click",  ()=>{location.href="../index.html"});
	document.querySelector("."+sliderNames[0]+"-btn").addEventListener("click", ()=>{swiper.slideToLoop(0, 800);});
	document.querySelector("."+sliderNames[1]+"-btn").addEventListener("click", ()=>{swiper.slideToLoop(1, 800);});
	document.querySelector("."+sliderNames[2]+"-btn").addEventListener("click", ()=>{swiper.slideToLoop(2, 800);});
	document.querySelector("."+sliderNames[3]+"-btn").addEventListener("click", ()=>{swiper.slideToLoop(3, 800);});
	document.querySelector("."+sliderNames[4]+"-btn").addEventListener("click", ()=>{swiper.slideToLoop(4, 800);});
	
    inputBoxs      = $$(".todo-input");
	listsContainer = $$(".list-container");
	
    inputBoxs.forEach(input=>{
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addTask(event.target.id);
            }
        });
    });

    listsContainer.forEach(list=>{
        list.addEventListener("click", function(e) {
            const px = e.target.parentElement.parentElement.querySelector("p");
            if (e.target.tagName === "P") {
                e.target.parentElement.classList.toggle("checked");
                saveData(e.target.parentElement.parentElement.id.replace("_list","_input"));
            } 
            else if (e.target.tagName === "SPAN") {
                const newDelete = prompt("Usuń wpis:", px.innerHTML);
                const idd = e.target.dataset.id;
                if (newDelete !== null && newDelete.trim() !== "") {        
                    e.target.parentElement.parentElement.remove();
                    saveData(idd+"_list");   
                }
            }
            else if (e.target.classList.contains("edit-btn")) {
                let newText = prompt("Edytuj zadanie:", px.innerHTML); 
                const idd = e.target.dataset.id;         
                if (newText !== null && newText.trim() !== "") {
                    px.innerHTML = newText;
                    saveData(idd+"_list");
                }
            }
        }, false);
    });
    zamienNaTextarea("Nota_input");

    const lastSlide = $("[data-name='Nota']");
    const lastSection = lastSlide.querySelector("section") || lastSlide.querySelector("main");
    console.log(lastSection);
    lastSection.innerHTML += `<div id="notatki"></div>`;

} // eof page ini
   
const zamienNaTextarea=(idInputa) => {
    // 1. Znajdź istniejący input
    const staryInput = document.getElementById(idInputa);
    if (!staryInput) return;

    // 2. Stwórz nowy element textarea
    const nowyTextarea = document.createElement('textarea');

    // 3. Przepisz wartości i najważniejsze atrybuty
    nowyTextarea.value = staryInput.value;          // Przepisuje wpisany tekst
    nowyTextarea.id = staryInput.id;                // Zachowuje to samo ID
    nowyTextarea.className = staryInput.className;  // Zachowuje te same klasy CSS
    nowyTextarea.placeholder = staryInput.placeholder; // Zachowuje placeholder

    // Opcjonalnie: możesz od razu dodać atrybuty typowe dla textarea
    nowyTextarea.rows = 4; 

    // 4. BŁYSKAWICZNA ZAMIANA w strukturze DOM
    staryInput.replaceWith(nowyTextarea);
}


const addTask=(id)=> {
    const inputBox = document.querySelector("#"+id);
    if (inputBox.value.trim() === '') {
        alert("Musisz coś wpisać!");
    } else {
        const listId = id.replace("_input","_list");
        const text = inputBox.value.trim();
        if (text==="delete666" || text==="Delete666") {
            console.log("Usuwam listę:",listId);
            localStorage.removeItem(listId);
            showTask(listId);
        } else{   
            createTaskElement(id.replace("_input","_list"),inputBox.value, false);
            saveData(id);
        }
    }
    inputBox.value = "";
}

const createTaskElement=(id, text, isChecked)=> {
    const idd = id.replace("_list","");
    let li = document.createElement("li");
    if (isChecked) li.classList.add("checked");

    let textSpan = document.createElement("p");
    textSpan.innerHTML = text;
    textSpan.className = idd+"_text";
    li.appendChild(textSpan);

    let btnContainer = document.createElement("div");

    let editBtn = document.createElement("button");
    editBtn.innerHTML = "✎";
    editBtn.className = "edit-btn";
    editBtn.dataset.id = idd;
    btnContainer.appendChild(editBtn);

    let deleteBtn = document.createElement("span");
    deleteBtn.innerHTML = "\u00d7";
    deleteBtn.dataset.id = idd;
    btnContainer.appendChild(deleteBtn);

    li.appendChild(btnContainer);
    listsContainer.forEach(container => {
        if (container.id === id) {
            container.appendChild(li);
        }
    });
}


function saveData(id) {
    const listId=id.replace("_input","_list");
    const listContainer=$("#"+listId);
    localStorage.setItem(listId, listContainer.innerHTML);
}

function showTask(id) {
    if (id) {
        const listId=id.replace("_input","_list");
        const listContainer=$("#"+listId);
        listContainer.innerHTML = localStorage.getItem(listId) || "";
    }
}

const setNote=(nota)=>{
	let arr = nota.split("\n");
	let html ='';
	arr.forEach((n)=>{
		html += '<p>'+n+'<p>'
	});
	document.querySelector("#notatki").innerHTML = html;
}  

const getNotatki=(u="nota.txt")=>{
    if (location.protocol !="file:"){
		    try {
					fetch(u)
					.then(r => {return r.text()})
					.then(txt => {
						console.log("txt=",txt);
						setNote(txt);
					})
					.catch(e => {console.log(e)});
			}
			catch (err) {
				console.log(err)
			}
		}
    
}


document.addEventListener("DOMContentLoaded",function(){
    document.documentElement.setAttribute("data-theme", "dark");
	pageINI();
    showTask();
    getNotatki("nota.txt");
});

</script>
<script>
const tx = document.getElementsByTagName('textarea');
for (let i = 0; i < tx.length; i++) {
  tx[i].setAttribute('style', 'height:' + (tx[i].scrollHeight) + 'px;overflow-y:hidden;');
  tx[i].addEventListener("input", OnInput, false);
}

function OnInput() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
}
</script>
