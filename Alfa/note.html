const DBLoad=(ten)=>{

const zwin=(id,direction)=>{
	let ten = document.querySelector("#"+id);
	console.log("re",ten.classList);
	if (direction===1){	
		ten.classList.remove("over")
		ten.classList.add("block")
	} else {
		ten.classList.add("over")

	}
}


const toggleFit_____=()=>{
    const area = document.getElementById('txtx');
    const minHeight = "45px"; // Tyle samo co w CSS

    // JeЕӣli aktualna wysokoЕӣДҮ jest rГіwna minimalnej (lub nieustawiona inline)
    if (area.style.height === minHeight || !area.style.height) {
      // RozwiЕ„ do wysokoЕӣci zawartoЕӣci (scrollHeight)
      // Dodajemy 2px na obramowanie, jeЕӣli box-sizing jest uЕјyty
      area.style.height = area.scrollHeight + "px";
    } else {
      // ZwiЕ„ do minimum
      area.style.height = minHeight;
    }
  }
  
const editRow=(ten,id)=>{	
	const dbid=ten.dataset.id;
	const title=ten.title;
	const content = document.querySelector("#"+id).textContent;
	//console.log(id,title,content);
	document.querySelector("#title").value=title;
	document.querySelector("#txtx").value=content;
	document.querySelector("#txtx").dataset.dbid=dbid;	
}

const deleteRow=(ten)=>{	
	const id=ten.dataset.id;
	const title=ten.title;
	//console.log(id,ten);

	} else {

	}	
}
