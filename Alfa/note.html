<!DOCTYPE html>
<html lang="pl">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 18 18'><text x='-1' y='14'>📝</text></svg>" />
	<meta name="theme-color" content="#369">
   <title>Note</title>  
   <meta name="HandheldFriendly" content="true">
   <meta name="mobile-web-app-capable" content="yes"> 
    <script>const storageName = "Note";</script>
    <link rel="stylesheet" href="./add/style.css">
   <style>
 	body {background:#444;}
   </style>
   <script src="./add/db.js"></script>
<script>
    const $=e=>document.querySelector(e);
    const $$=e=>document.querySelectorAll(e);
    let note = `
klucz 1
klucz 2
klucz 3
`;
  
const setNote=(nota)=>{
	let arr = nota.split("\n");
	let html ='';
	arr.forEach((n)=>{
		html += '<p>'+n+'<p>'
	});
	document.querySelector("#note").innerHTML = html;
}  
    //---dom ready--------------------------------
    document.addEventListener("DOMContentLoaded",function(){
    	setNote(note);
        let u ="note.txt";
        try {
				fetch(u)
				.then(r => {return r.text()})
				.then(txt => {
				    console.log("txt=",txt);
				    setNote(txt);
				})
				.catch(e => {console.log(e)});
		}
		catch (err) {
			console.log(err)
		}
    })
    //---DOM READY----------------------------------
 
/////////////////////
        const jutro=(ile=1)=>{
               const weekdays = ["niedziela", "poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota"];
               let tomorrow = new Date();
               tomorrow.setDate(tomorrow.getDate() + ile);
               let dw = tomorrow.getDay();
               return weekdays[dw]
        }
        
let pasteNR=0; 
const setINFO=()=>{
	return "info INFO ???"
};      
const PasteFB=(nr=1)=>{
    console.log("pasteNR=",pasteNR)
    let txtx = document.getElementById("txtx");
    if (pasteNR===1) {txtx.value=setINFO();}
    if (pasteNR===2) {txtx.value=`Jeśli dziś ${jutro(0)} to idę do piekarni: "Mąka i woda" po chleb i bułki`;}
    if (pasteNR===0 && nr===2) txtx.value=`Poproszę na pojutrze - ${jutro(nr)}:\n1x chleb Żytni\n2x bułki zwykłe\n--\nZbigniew Sz`;
    if (pasteNR===0 && nr===1) txtx.value=`Poproszę na jutro - ${jutro(nr)}:
1x chleb żytni
2x bułki zwykłe
1x bułka z sezamem
--
Zbigniew Sz`;
pasteNR++;
if (pasteNR>2)pasteNR=0;
}
            
 const PasteTXT=async()=>{
     let txtx = document.getElementById("txtx");
     txtx.value="";
     //txtx.style.height="20em";
     const text = await navigator.clipboard.readText();
     txtx.value = text;
 }
 const CopyTXT=()=>{
     let txtx = document.getElementById("txtx");
     txtx.select();
     navigator.clipboard.writeText(txtx.value);
 }
//////////  Dbase  /////////////              
// 1. Inicjalizacja "tabeli" 
const dbName = storageName+"DB";
const notesDB = new SimpleDB(dbName);


const DBSave=(ten)=>{
	console.log("Load Save",dbName);
	const content = document.getElementById('txtx').value;
	const title   = document.getElementById('title').value;
	console.log(title,content);
	// 2. Dodawanie danych
	notesDB.create({ title: title, content: content });
	// 3. Pobieranie i wyświetlanie
	akcja("Zapisano");
}

const DBLoad=(ten)=>{
	const DBarr = notesDB.getAll();
	//console.table(DBarr);
	DBarr.reverse();
	let html="";
	DBarr.forEach((obj)=>{
		//console.log(obj);
		html += `<div><span onclick="deleteRow(this)" id="${obj.id}" title="${obj.title}"> ❌ </span><h3 class="line">${obj.title}</h3><p>${obj.content}</p></div>`;
	});
	document.getElementById('noteall').innerHTML = html;
	akcja("Pokaz");
}

const deleteRow=(ten)=>{	
	const id=ten.id;
	const title=ten.title;
	//console.log(id,ten);
	if (confirm("Czy kasować ✳️ "+title+" ✳️") == true) {
	  	notesDB.delete(id);
		DBLoad();
	} else {
	  console.log("Nie teraz");
	}
	
}

document.addEventListener("DOMContentLoaded",function(){
	document.getElementById('title').value = "Zapis_"+uid();
	DBLoad(null);
});

       
</script>    
</head>

<body>
<div id="key-notifier-container"></div>
	<div class="theme-switch" id="home-btn">🏠</div>
	<div class="theme-switch active" id="note-btn">📝</div>
	<div class="theme-switch" id="theme-toggle">🌙</div>
	<div class="theme-switch" id="gamma-btn">👫</div>
	<div class="theme-switch" id="beta-btn">🧔</div>
	<div class="theme-switch" id="alfa-btn">🧑‍🦳</div>

		<div id="copykeys" class="container center">
                <button onclick="PasteTXT()" class="button">Paste</button> 
                <button onclick="CopyTXT()" class="button">Copy</button> 
                <button onclick="document.getElementById('txtx').value='';" class="button">Clear</button> 
                <button onclick="PasteFB(1)" class="button navy">Chleb</button> 
        </div>
<!--⭕✅☑️✔️❌👁️-->

   <div class="container notop">
   <span onclick="DBSave(this)" title="Local Save"> ✅ </span>
   <span onclick="DBLoad(this)" title="Load Local"> 👁️ </span>
   &nbsp;
   <h2 style="display: inline-block;">Note</h2>
   	<input type="text" id="title" value="Zapis" /> 
	<textarea spellcheck="false"   autocorrect="off"   autocapitalize="off"   autocomplete="off" translate="no" id="txtx" onclick="$('#txtx').style.height='20em';"></textarea>
   </div>
    
       <div class="container notop">    
        <button class="big" onclick="zapisz(document.getElementById('txtx').value,storageName+'.txt');">Zapisz na dysk</button>
        <button class="big" onclick="wczytajPlik()">Wczytaj z dysku</button>
    </div>

    <div id="noteall" class="container notop nota"></div>
   <pre class="log"></pre>
   <div id="note" class="container notop nota"></div>
   <script src="./add/mini.js"></script>
   <script src="./add/save.js"></script>
</body>
</html>
