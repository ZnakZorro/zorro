      <div class="demo-section">
        <h2>2. Settings Menu</h2>
        <p>A popover menu that toggles with one attribute.</p>

        <button
          commandfor="settings-menu"
          command="toggle-popover"
          class="settings-button"
        >
          ⚙️ Settings
        </button>

        <div id="settings-menu" popover>

function cccc4(){
	var text = "Example text to appear on clipboard";
	navigator.clipboard.writeText(text).then(function() {
	  console.log('Async: Copying to clipboard was successful!');
	}, function(err) {
	  console.error('Async: Could not copy text: ', err);
	});
}

function copyOnIpAddress(text) {
  // Tworzymy ukryty element textarea
  const textArea = document.createElement("textarea");
  textArea.value = text;
  // Ważne: element musi być w DOM, ale niewidoczny dla użytkownika
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  textArea.style.top = "0";
  document.body.appendChild(textArea);
 
  // Zaznaczamy tekst
  textArea.focus();
  textArea.select();
  textArea.setSelectionRange(0, 99999); // Dla urządzeń mobilnych

try {
		const successful = document.execCommand('copy');
		if (successful) {
			console.log('Skopiowano pomyślnie!');
		}
	} catch (err) {
	console.error('Błąd kopiowania:', err);
	}

	document.body.removeChild(textArea);
}

             const CopyTXT=()=>{
                 let txtx = document.getElementById("sunTEXT");
                 txtx.select();
                 navigator.clipboard.writeText(txtx.value);
             }
